<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drill & Delight</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background: #fff8ef;
        }

        /* LOGO ANIMATION */
        .logo {
            width: 180px;
            margin-top: 20px;
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        h1 {
            margin-top: 10px;
            font-size: 32px;
            color: #6d2e00;
        }

        .menu-section {
            padding: 20px;
        }

        .menu-image {
            width: 90%;
            max-width: 600px;
            border-radius: 10px;
        }

        /* WhatsApp Button */
        .whatsapp-btn {
            display: inline-block;
            background-color: #25D366;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 18px;
            text-decoration: none;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .whatsapp-btn:hover {
            background-color: #1eb457;
        }

        .social {
            margin-top: 30px;
        }

    </style>
</head>

<body>

    <!-- LOGO -->
    <img src="images/logo.jpg" class="logo" alt="Drill & Delight Logo">

    <h1>Drill & Delight</h1>

    <!-- MENU -->
    <div class="menu-section">
        <h2>Menu</h2>
        <img src="images/menu1.jpg" class="menu-image">
        <img src="images/menu2.jpg" class="menu-image" style="margin-top:15px;">
        <img src="images/menu3.jpg" class="menu-image" style="margin-top:15px;">
    </div>

    <!-- WhatsApp Click-to-Chat -->
    <a class="whatsapp-btn"
       href="https://wa.me/919442400009?text=Hi%20I%20would%20like%20to%20order%20an%20icecream"
       target="_blank">
       💬 WhatsApp Us
    </a>

    <!-- Instagram -->
    <div class="social">
        <a href="https://www.instagram.com/drilldelight/" target="_blank">
            <img src="images/Capture2.JPG" alt="Instagram" width="150">
        </a>
        <br><br>
        <a href="https://www.instagram.com/drilldelight/" 
           target="_blank"
           style="color:#ff4f85; font-weight:bold; font-size:18px;">
           👉 Follow us on Instagram
        </a>
    </div>

</body>
</html>
